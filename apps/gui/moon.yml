$schema: https://moonrepo.dev/schemas/project.json
language: system

dependsOn:
  - shared-contract

tasks:
  lint:
    command: 'bun run lint'
    inputs:
      - 'src/**/*'
      - 'package.json'

  typecheck:
    command: 'bunx tsc --noEmit'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'

  test:
    command: 'bun run test:coverage'
    inputs:
      - 'src/**/*'
      - 'vitest.config.ts'
      - 'package.json'

  build:
    command: 'bun run build'
    inputs:
      - 'src/**/*'
      - 'index.html'
      - 'vite.config.*'
      - 'package.json'
      - 'bun.lockb'
    outputs:
      - 'dist'
