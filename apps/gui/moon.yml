$schema: https://moonrepo.dev/schemas/project.json
language: system

dependsOn:
  - shared-contract

tasks:
  lint:
    command: 'bun run lint'
    inputs:
      - 'src/**/*'
      - 'package.json'
      - 'eslint.config.js'

  typecheck:
    command: 'bunx tsc --noEmit'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'


  build:
    command: 'bun run build'
    inputs:
      - 'src/**/*'
      - 'index.html'
      - 'vite.config.*'
      - 'package.json'
      - 'bun.lockb'
    outputs:
      - 'dist'
