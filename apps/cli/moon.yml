$schema: https://moonrepo.dev/schemas/project.json
language: system

dependsOn:
  - shared-contract

tasks:
  format:
    command: 'gofmt -l .'
    inputs:
      - '**/*.go'

  vet:
    command: 'go vet ./...'
    inputs:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'

  test:
    command: 'go test -v -coverprofile=coverage.out ./cmd/...'
    inputs:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'

  coverage:
    command: 'go tool cover -func=coverage.out'
    inputs:
      - 'coverage.out'
    deps:
      - test

  build:
    command: 'go build -v ./...'
    inputs:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
