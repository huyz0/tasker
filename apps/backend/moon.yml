tasks:
  test:
    command: 'bun run test'
    inputs:
      - 'src/**/*'
      - '**/*.test.ts'
  test-integration:
    command: 'bun run test:integration'
    inputs:
      - 'src/**/*'
      - '**/*.integration.test.ts'
  build:
    command: 'bun build ./src/index.ts --target bun --outdir dist'
  build-standalone:
    command: 'bun run build:standalone'
    inputs:
      - 'src/**/*'
    outputs:
      - 'dist/tasker-standalone'
  lint:
    command: 'bun run lint'
    inputs:
      - 'src/**/*'
      - 'package.json'
