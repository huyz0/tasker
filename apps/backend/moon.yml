tasks:
  test:
    command: 'bun run test'
    inputs:
      - 'src/**/*'
      - '**/*.test.ts'
  build:
    command: 'bun build ./index.ts --target bun --outdir dist'
  build-standalone:
    command: 'bun run build:standalone'
    inputs:
      - 'index.ts'
      - 'db.ts'
      - 'schema*.ts'
    outputs:
      - 'tasker-standalone'
