$schema: https://moonrepo.dev/schemas/project.json
language: system

tasks:
  format:
    command: 'bunx tsp format --check "**/*.tsp"'
    inputs:
      - '**/*.tsp'

  compile:
    script: 'bunx tsp compile main.tsp && bunx buf generate'
    inputs:
      - '**/*.tsp'
      - 'package.json'
    outputs:
      - 'tsp-output'
      - 'gen'
