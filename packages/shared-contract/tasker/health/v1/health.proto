syntax = "proto3";

package tasker.health.v1;

option go_package = "github.com/huyz0/tasker/apps/cli/gen/tasker/health/v1";

message PingRequest {}

message PingResponse {
  string message = 1;
  string dbStatus = 2;
}

service HealthService {
  rpc Ping(PingRequest) returns (PingResponse);
}

message User {
  string id = 1;
  string email = 2;
  string name = 3;
  string avatarUrl = 4;
  string createdAt = 5;
}

message Organization {
  string id = 1;
  string name = 2;
  string slug = 3;
  string role = 4;
}

message GetIdentityRequest {}
message GetIdentityResponse {
  User user = 1;
}

service AuthService {
  rpc GetIdentity(GetIdentityRequest) returns (GetIdentityResponse);
}

message ListOrgsRequest {}
message ListOrgsResponse {
  repeated Organization organizations = 1;
}

message SeedOrgRequest {
  string name = 1;
  string slug = 2;
}
message SeedOrgResponse {
  Organization organization = 1;
}

message InviteUserRequest {
  string orgId = 1;
  string email = 2;
}
message InviteUserResponse {
  bool success = 1;
}

service OrgService {
  rpc ListOrgs(ListOrgsRequest) returns (ListOrgsResponse);
  rpc SeedOrg(SeedOrgRequest) returns (SeedOrgResponse);
  rpc InviteUser(InviteUserRequest) returns (InviteUserResponse);
}

message TaskType {
  string id = 1;
  string orgId = 2;
  string projectId = 3;
  string name = 4;
  string createdAt = 5;
}

message TaskStatus {
  string id = 1;
  string taskTypeId = 2;
  string name = 3;
}

message TaskStatusTransition {
  string id = 1;
  string taskTypeId = 2;
  string fromStatusId = 3;
  string toStatusId = 4;
}

message GetTaskTypeRequest {
  string id = 1;
}

message GetTaskTypeResponse {
  TaskType taskType = 1;
  repeated TaskStatus statuses = 2;
  repeated TaskStatusTransition transitions = 3;
}

message CreateTaskTypeRequest {
  string orgId = 1;
  string projectId = 2;
  string name = 3;
}

message CreateTaskTypeResponse {
  TaskType taskType = 1;
}

service TaskTypeService {
  rpc GetTaskType(GetTaskTypeRequest) returns (GetTaskTypeResponse);
  rpc CreateTaskType(CreateTaskTypeRequest) returns (CreateTaskTypeResponse);
}

message ProjectTemplate {
  string id = 1;
  string orgId = 2;
  string name = 3;
  string description = 4;
}

message Project {
  string id = 1;
  string orgId = 2;
  string templateId = 3;
  string name = 4;
  string ownerId = 5;
}

message GetProjectTemplateRequest {
  string id = 1;
}

message GetProjectTemplateResponse {
  ProjectTemplate template = 1;
}

message CreateProjectTemplateRequest {
  string orgId = 1;
  string name = 2;
  string description = 3;
}

message CreateProjectTemplateResponse {
  ProjectTemplate template = 1;
}

service ProjectTemplateService {
  rpc GetTemplate(GetProjectTemplateRequest) returns (GetProjectTemplateResponse);
  rpc CreateTemplate(CreateProjectTemplateRequest) returns (CreateProjectTemplateResponse);
}

message GetProjectRequest {
  string id = 1;
}

message GetProjectResponse {
  Project project = 1;
}

message CreateProjectRequest {
  string orgId = 1;
  string templateId = 2;
  string name = 3;
  string ownerId = 4;
}

message CreateProjectResponse {
  Project project = 1;
}

service ProjectService {
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);
}

message AgentRole {
  string id = 1;
  string name = 2;
  string system_prompt = 3;
  string capabilities = 4;
}

message Agent {
  string id = 1;
  string org_id = 2;
  string agent_role_id = 3;
  string name = 4;
}

message CreateAgentRoleRequest {
  string name = 1;
  string system_prompt = 2;
  string capabilities = 3;
}

message CreateAgentRoleResponse {
  AgentRole role = 1;
}

message CreateAgentRequest {
  string org_id = 1;
  string agent_role_id = 2;
  string name = 3;
}

message CreateAgentResponse {
  Agent agent = 1;
}

service AgentService {
  rpc CreateAgentRole(CreateAgentRoleRequest) returns (CreateAgentRoleResponse);
  rpc CreateAgent(CreateAgentRequest) returns (CreateAgentResponse);
}

message Task {
  string id = 1;
  string project_id = 2;
  string title = 3;
  string status = 4;
  string description = 5;
}

message CreateTaskRequest {
  string project_id = 1;
  string title = 2;
  string status = 3;
  string description = 4;
}

message CreateTaskResponse {
  Task task = 1;
}

message AssignTaskRequest {
  string task_id = 1;
  string agent_id = 2;
  string user_id = 3;
}

message AssignTaskResponse {
  bool success = 1;
}

service TaskService {
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  rpc AssignTask(AssignTaskRequest) returns (AssignTaskResponse);
}

message Folder {
  string id = 1;
  string projectId = 2;
  string parentId = 3;
  string name = 4;
}

message Artifact {
  string id = 1;
  string folderId = 2;
  string name = 3;
  string description = 4;
  string content = 5;
}

message TaskArtifactLink {
  string id = 1;
  string taskId = 2;
  string artifactId = 3;
}

message CreateFolderRequest {
  string projectId = 1;
  string parentId = 2;
  string name = 3;
}

message CreateFolderResponse {
  Folder folder = 1;
}

message CreateArtifactRequest {
  string folderId = 1;
  string name = 2;
  string description = 3;
  string content = 4;
}

message CreateArtifactResponse {
  Artifact artifact = 1;
}

message LinkTaskArtifactRequest {
  string taskId = 1;
  string artifactId = 2;
}

message LinkTaskArtifactResponse {
  TaskArtifactLink link = 1;
}

service ArtifactService {
  rpc CreateFolder(CreateFolderRequest) returns (CreateFolderResponse);
  rpc CreateArtifact(CreateArtifactRequest) returns (CreateArtifactResponse);
  rpc LinkTaskArtifact(LinkTaskArtifactRequest) returns (LinkTaskArtifactResponse);
}

message Comment {
  string id = 1;
  string entityId = 2;
  string entityType = 3;
  string userId = 4;
  string agentId = 5;
  string content = 6;
}

message CreateCommentRequest {
  string entityId = 1;
  string entityType = 2;
  string userId = 3;
  string agentId = 4;
  string content = 5;
}

message CreateCommentResponse {
  Comment comment = 1;
}

message ListCommentsRequest {
  string entityId = 1;
  string entityType = 2;
}

message ListCommentsResponse {
  repeated Comment comments = 1;
}

service CommentService {
  rpc CreateComment(CreateCommentRequest) returns (CreateCommentResponse);
  rpc ListComments(ListCommentsRequest) returns (ListCommentsResponse);
}

message TaskNote {
  string id = 1;
  string taskId = 2;
  string agentId = 3;
  string content = 4;
}

message CreateTaskNoteRequest {
  string taskId = 1;
  string agentId = 2;
  string content = 3;
}

message CreateTaskNoteResponse {
  TaskNote taskNote = 1;
}

message ListTaskNotesRequest {
  string taskId = 1;
}

message ListTaskNotesResponse {
  repeated TaskNote taskNotes = 1;
}

service TaskNoteService {
  rpc CreateTaskNote(CreateTaskNoteRequest) returns (CreateTaskNoteResponse);
  rpc ListTaskNotes(ListTaskNotesRequest) returns (ListTaskNotesResponse);
}

message RepositoryLink {
  string id = 1;
  string project_id = 2;
  string provider = 3;
  string remote_name = 4;
  string created_at = 5;
}

message RemotePullRequest {
  string id = 1;
  string repository_link_id = 2;
  string task_id = 3;
  string remote_pr_id = 4;
  string title = 5;
  string status = 6;
  string url = 7;
  string updated_at = 8;
}

message AddRepositoryLinkRequest {
  string project_id = 1;
  string provider = 2;
  string remote_name = 3;
  string oauth_code = 4;
}

message AddRepositoryLinkResponse {
  RepositoryLink link = 1;
}

message ListRepositoryLinksRequest {
  string project_id = 1;
}

message ListRepositoryLinksResponse {
  repeated RepositoryLink links = 1;
}

message SyncPullRequestsRequest {
  string project_id = 1;
}

message SyncPullRequestsResponse {
  bool success = 1;
}

service RepositoryService {
  rpc AddRepositoryLink(AddRepositoryLinkRequest) returns (AddRepositoryLinkResponse);
  rpc ListRepositoryLinks(ListRepositoryLinksRequest) returns (ListRepositoryLinksResponse);
  rpc SyncPullRequests(SyncPullRequestsRequest) returns (SyncPullRequestsResponse);
}
