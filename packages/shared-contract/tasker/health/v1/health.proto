syntax = "proto3";

package tasker.health.v1;

option go_package = "github.com/huyz0/tasker/apps/cli/gen/tasker/health/v1";

message PingRequest {}

message PingResponse {
  string message = 1;
  string dbStatus = 2;
  string natsStatus = 3;
  string version = 4;
  int32 uptimeSeconds = 5;
}

service HealthService {
  rpc Ping(PingRequest) returns (PingResponse);
}

message User {
  string id = 1;
  string email = 2;
  string name = 3;
  string avatarUrl = 4;
  string createdAt = 5;
}

message Organization {
  string id = 1;
  string name = 2;
  string slug = 3;
  string role = 4;
  string parentOrgId = 5;
  string deletedAt = 6;
  int32 binRetentionDays = 7;
}

message GetIdentityRequest {}
message GetIdentityResponse {
  User user = 1;
}

service AuthService {
  rpc GetIdentity(GetIdentityRequest) returns (GetIdentityResponse);
}

message ListOrgsRequest {
  PageRequest page = 1;
  bool onlyDeleted = 2;
}
message ListOrgsResponse {
  repeated Organization organizations = 1;
  PageResponse page = 2;
}

message ArchiveOrgRequest {
  string orgId = 1;
}
message ArchiveOrgResponse {
  bool success = 1;
}

message RestoreOrgRequest {
  string orgId = 1;
}
message RestoreOrgResponse {
  bool success = 1;
}

message PurgeOrgRequest {
  string orgId = 1;
}
message PurgeOrgResponse {
  bool success = 1;
}

message SetOrgRetentionDaysRequest {
  string orgId = 1;
  int32 binRetentionDays = 2;
}
message SetOrgRetentionDaysResponse {
  bool success = 1;
}

message SeedOrgRequest {
  string name = 1;
  string slug = 2;
  string parentOrgId = 3;
}
message SeedOrgResponse {
  Organization organization = 1;
}

message InviteUserRequest {
  string orgId = 1;
  string email = 2;
}
message InviteUserResponse {
  bool success = 1;
}

service OrgService {
  rpc ListOrgs(ListOrgsRequest) returns (ListOrgsResponse);
  rpc SeedOrg(SeedOrgRequest) returns (SeedOrgResponse);
  rpc ArchiveOrg(ArchiveOrgRequest) returns (ArchiveOrgResponse);
  rpc RestoreOrg(RestoreOrgRequest) returns (RestoreOrgResponse);
  rpc PurgeOrg(PurgeOrgRequest) returns (PurgeOrgResponse);
  rpc SetOrgRetentionDays(SetOrgRetentionDaysRequest) returns (SetOrgRetentionDaysResponse);
  rpc InviteUser(InviteUserRequest) returns (InviteUserResponse);
}

message TaskType {
  string id = 1;
  string orgId = 2;
  string projectId = 3;
  string name = 4;
  string createdAt = 5;
  string parentId = 6;
}

message TaskStatus {
  string id = 1;
  string taskTypeId = 2;
  string name = 3;
}

message TaskStatusTransition {
  string id = 1;
  string taskTypeId = 2;
  string fromStatusId = 3;
  string toStatusId = 4;
}

message GetTaskTypeRequest {
  string id = 1;
}

message GetTaskTypeResponse {
  TaskType taskType = 1;
  repeated TaskStatus statuses = 2;
  repeated TaskStatusTransition transitions = 3;
}

message CreateTaskTypeRequest {
  string orgId = 1;
  string projectId = 2;
  string name = 3;
  string parentId = 4;
}

message CreateTaskTypeResponse {
  TaskType taskType = 1;
}

message CreateTaskStatusRequest {
  string taskTypeId = 1;
  string name = 2;
}

message CreateTaskStatusResponse {
  TaskStatus status = 1;
}

message CreateTaskStatusTransitionRequest {
  string taskTypeId = 1;
  string fromStatusId = 2;
  string toStatusId = 3;
}

message CreateTaskStatusTransitionResponse {
  TaskStatusTransition transition = 1;
}

service TaskTypeService {
  rpc GetTaskType(GetTaskTypeRequest) returns (GetTaskTypeResponse);
  rpc CreateTaskType(CreateTaskTypeRequest) returns (CreateTaskTypeResponse);
  rpc CreateTaskStatus(CreateTaskStatusRequest) returns (CreateTaskStatusResponse);
  rpc CreateTaskStatusTransition(CreateTaskStatusTransitionRequest) returns (CreateTaskStatusTransitionResponse);
}

message ProjectTemplate {
  string id = 1;
  string orgId = 2;
  string name = 3;
  string description = 4;
  string rootTaskTypeId = 5;
}

message Project {
  string id = 1;
  string orgId = 2;
  string templateId = 3;
  string name = 4;
  string ownerId = 5;
  string deletedAt = 6;
  string key = 7;
}

message GetProjectTemplateRequest {
  string id = 1;
}

message GetProjectTemplateResponse {
  ProjectTemplate template = 1;
}

message CreateProjectTemplateRequest {
  string orgId = 1;
  string name = 2;
  string description = 3;
  string rootTaskTypeId = 4;
}

message CreateProjectTemplateResponse {
  ProjectTemplate template = 1;
}

message ListProjectTemplatesRequest {
  string orgId = 1;
}

message ListProjectTemplatesResponse {
  repeated ProjectTemplate templates = 1;
}

service ProjectTemplateService {
  rpc GetTemplate(GetProjectTemplateRequest) returns (GetProjectTemplateResponse);
  rpc CreateTemplate(CreateProjectTemplateRequest) returns (CreateProjectTemplateResponse);
  rpc ListTemplates(ListProjectTemplatesRequest) returns (ListProjectTemplatesResponse);
}

message GetProjectRequest {
  string id = 1;
}

message GetProjectResponse {
  Project project = 1;
}

message CreateProjectRequest {
  string orgId = 1;
  string templateId = 2;
  string name = 3;
  string ownerId = 4;
}

message CreateProjectResponse {
  Project project = 1;
}

message ListProjectsRequest {
  string orgId = 1;
  PageRequest page = 2;
  bool onlyDeleted = 3;
}

message ListProjectsResponse {
  repeated Project projects = 1;
  PageResponse page = 2;
}

message ArchiveProjectRequest {
  string projectId = 1;
}
message ArchiveProjectResponse {
  bool success = 1;
}

message RestoreProjectRequest {
  string projectId = 1;
}
message RestoreProjectResponse {
  bool success = 1;
}

message PurgeProjectRequest {
  string projectId = 1;
}
message PurgeProjectResponse {
  bool success = 1;
}

service ProjectService {
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc ArchiveProject(ArchiveProjectRequest) returns (ArchiveProjectResponse);
  rpc RestoreProject(RestoreProjectRequest) returns (RestoreProjectResponse);
  rpc PurgeProject(PurgeProjectRequest) returns (PurgeProjectResponse);
}

message AgentRole {
  string id = 1;
  string name = 2;
  string system_prompt = 3;
  string capabilities = 4;
}

message Agent {
  string id = 1;
  string org_id = 2;
  string agent_role_id = 3;
  string name = 4;
  string deletedAt = 5;
}

message CreateAgentRoleRequest {
  string name = 1;
  string system_prompt = 2;
  string capabilities = 3;
}

message CreateAgentRoleResponse {
  AgentRole role = 1;
}

message ListAgentRolesRequest {
  PageRequest page = 1;
}

message ListAgentRolesResponse {
  repeated AgentRole roles = 1;
  PageResponse page = 2;
}

message CreateAgentRequest {
  string org_id = 1;
  string agent_role_id = 2;
  string name = 3;
}

message CreateAgentResponse {
  Agent agent = 1;
}

service AgentService {
  rpc CreateAgentRole(CreateAgentRoleRequest) returns (CreateAgentRoleResponse);
  rpc ListAgentRoles(ListAgentRolesRequest) returns (ListAgentRolesResponse);
  rpc CreateAgent(CreateAgentRequest) returns (CreateAgentResponse);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  rpc ArchiveAgent(ArchiveAgentRequest) returns (ArchiveAgentResponse);
  rpc RestoreAgent(RestoreAgentRequest) returns (RestoreAgentResponse);
  rpc PurgeAgent(PurgeAgentRequest) returns (PurgeAgentResponse);
}

message ListAgentsRequest {
  string org_id = 1;
  bool onlyDeleted = 2;
  PageRequest page = 3;
}

message ListAgentsResponse {
  repeated Agent agents = 1;
  PageResponse page = 2;
}

message ArchiveAgentRequest {
  string agentId = 1;
}
message ArchiveAgentResponse {
  bool success = 1;
}

message RestoreAgentRequest {
  string agentId = 1;
}
message RestoreAgentResponse {
  bool success = 1;
}

message PurgeAgentRequest {
  string agentId = 1;
}
message PurgeAgentResponse {
  bool success = 1;
}

message Task {
  string id = 1;
  string project_id = 2;
  string title = 3;
  string status = 4;
  string description = 5;
  string deletedAt = 6;
  string display_id = 7;
  string task_type_id = 8;
  string created_by = 9;
}

message CreateTaskRequest {
  string project_id = 1;
  string title = 2;
  string status = 3;
  string description = 4;
  string task_type_id = 5;
}

message CreateTaskResponse {
  Task task = 1;
}

message AssignTaskRequest {
  string task_id = 1;
  string agent_id = 2;
  string user_id = 3;
}

message AssignTaskResponse {
  bool success = 1;
}

message TaskReviewer {
  string id = 1;
  string task_id = 2;
  string user_id = 3;
}

message AddTaskReviewerRequest {
  string task_id = 1;
  string user_id = 2;
}
message AddTaskReviewerResponse {
  bool success = 1;
}

message RemoveTaskReviewerRequest {
  string task_id = 1;
  string user_id = 2;
}
message RemoveTaskReviewerResponse {
  bool success = 1;
}

message ListTaskReviewersRequest {
  string task_id = 1;
}
message ListTaskReviewersResponse {
  repeated TaskReviewer reviewers = 1;
}

message PageRequest {
  int32 limit = 1;
  string cursor = 2;
  string filter = 3;
  string sort = 4;
}

message PageResponse {
  string next_cursor = 1;
  int32 total_count = 2;
}

message ListTasksRequest {
  string project_id = 1;
  PageRequest page = 2;
  bool onlyDeleted = 3;
}

message ListTasksResponse {
  repeated Task tasks = 1;
  PageResponse page = 2;
}

message UpdateTaskStatusRequest {
  string taskId = 1;
  string status = 2;
}

message UpdateTaskStatusResponse {
  Task task = 1;
}

message DeleteTaskRequest {
  string taskId = 1;
}

message DeleteTaskResponse {
  bool success = 1;
}

message RestoreTaskRequest {
  string taskId = 1;
}

message RestoreTaskResponse {
  bool success = 1;
}

message PurgeTaskRequest {
  string taskId = 1;
}

message PurgeTaskResponse {
  bool success = 1;
}

service TaskService {
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  rpc AssignTask(AssignTaskRequest) returns (AssignTaskResponse);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  rpc UpdateTaskStatus(UpdateTaskStatusRequest) returns (UpdateTaskStatusResponse);
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse);
  rpc RestoreTask(RestoreTaskRequest) returns (RestoreTaskResponse);
  rpc PurgeTask(PurgeTaskRequest) returns (PurgeTaskResponse);
  rpc AddTaskReviewer(AddTaskReviewerRequest) returns (AddTaskReviewerResponse);
  rpc RemoveTaskReviewer(RemoveTaskReviewerRequest) returns (RemoveTaskReviewerResponse);
  rpc ListTaskReviewers(ListTaskReviewersRequest) returns (ListTaskReviewersResponse);
}

message Folder {
  string id = 1;
  string projectId = 2;
  string parentId = 3;
  string name = 4;
  string deletedAt = 5;
}

message Artifact {
  string id = 1;
  string folderId = 2;
  string name = 3;
  string description = 4;
  string content = 5;
  string deletedAt = 6;
  string contentType = 7;
}

message TaskArtifactLink {
  string id = 1;
  string taskId = 2;
  string artifactId = 3;
}

message CreateFolderRequest {
  string projectId = 1;
  string parentId = 2;
  string name = 3;
}

message CreateFolderResponse {
  Folder folder = 1;
}

message CreateArtifactRequest {
  string folderId = 1;
  string name = 2;
  string description = 3;
  string content = 4;
  string contentType = 5;
}

message CreateArtifactResponse {
  Artifact artifact = 1;
}

message LinkTaskArtifactRequest {
  string taskId = 1;
  string artifactId = 2;
}

message LinkTaskArtifactResponse {
  TaskArtifactLink link = 1;
}

message ListArtifactsRequest {
  string folderId = 1;
  PageRequest page = 2;
  bool onlyDeleted = 3;
}

message ListArtifactsResponse {
  repeated Artifact artifacts = 1;
  PageResponse page = 2;
}

message ListFoldersRequest {
  string projectId = 1;
  PageRequest page = 2;
  bool onlyDeleted = 3;
}

message ListFoldersResponse {
  repeated Folder folders = 1;
  PageResponse page = 2;
}

message ArchiveArtifactRequest {
  string artifactId = 1;
}
message ArchiveArtifactResponse {
  bool success = 1;
}

message RestoreArtifactRequest {
  string artifactId = 1;
}
message RestoreArtifactResponse {
  bool success = 1;
}

message ArchiveFolderRequest {
  string folderId = 1;
}
message ArchiveFolderResponse {
  bool success = 1;
}

message RestoreFolderRequest {
  string folderId = 1;
}
message RestoreFolderResponse {
  bool success = 1;
}

message PurgeArtifactRequest {
  string artifactId = 1;
}
message PurgeArtifactResponse {
  bool success = 1;
}

message PurgeFolderRequest {
  string folderId = 1;
}
message PurgeFolderResponse {
  bool success = 1;
}

service ArtifactService {
  rpc CreateFolder(CreateFolderRequest) returns (CreateFolderResponse);
  rpc CreateArtifact(CreateArtifactRequest) returns (CreateArtifactResponse);
  rpc LinkTaskArtifact(LinkTaskArtifactRequest) returns (LinkTaskArtifactResponse);
  rpc ListArtifacts(ListArtifactsRequest) returns (ListArtifactsResponse);
  rpc ListFolders(ListFoldersRequest) returns (ListFoldersResponse);
  rpc ArchiveArtifact(ArchiveArtifactRequest) returns (ArchiveArtifactResponse);
  rpc RestoreArtifact(RestoreArtifactRequest) returns (RestoreArtifactResponse);
  rpc ArchiveFolder(ArchiveFolderRequest) returns (ArchiveFolderResponse);
  rpc RestoreFolder(RestoreFolderRequest) returns (RestoreFolderResponse);
  rpc PurgeArtifact(PurgeArtifactRequest) returns (PurgeArtifactResponse);
  rpc PurgeFolder(PurgeFolderRequest) returns (PurgeFolderResponse);
}

message Comment {
  string id = 1;
  string entityId = 2;
  string entityType = 3;
  string userId = 4;
  string agentId = 5;
  string content = 6;
  string createdAt = 7;
}

message CreateCommentRequest {
  string entityId = 1;
  string entityType = 2;
  string userId = 3;
  string agentId = 4;
  string content = 5;
}

message CreateCommentResponse {
  Comment comment = 1;
}

message ListCommentsRequest {
  string entityId = 1;
  string entityType = 2;
}

message ListCommentsResponse {
  repeated Comment comments = 1;
}

service CommentService {
  rpc CreateComment(CreateCommentRequest) returns (CreateCommentResponse);
  rpc ListComments(ListCommentsRequest) returns (ListCommentsResponse);
}

message TaskNote {
  string id = 1;
  string taskId = 2;
  string agentId = 3;
  string content = 4;
}

message CreateTaskNoteRequest {
  string taskId = 1;
  string agentId = 2;
  string content = 3;
}

message CreateTaskNoteResponse {
  TaskNote taskNote = 1;
}

message ListTaskNotesRequest {
  string taskId = 1;
}

message ListTaskNotesResponse {
  repeated TaskNote taskNotes = 1;
}

service TaskNoteService {
  rpc CreateTaskNote(CreateTaskNoteRequest) returns (CreateTaskNoteResponse);
  rpc ListTaskNotes(ListTaskNotesRequest) returns (ListTaskNotesResponse);
}

message Label {
  string id = 1;
  string orgId = 2;
  string name = 3;
  string color = 4;
}

message CreateLabelRequest {
  string orgId = 1;
  string name = 2;
  string color = 3;
}

message CreateLabelResponse {
  Label label = 1;
}

message ListLabelsRequest {
  string orgId = 1;
  PageRequest page = 2;
}

message ListLabelsResponse {
  repeated Label labels = 1;
  PageResponse page = 2;
}

message AttachLabelRequest {
  string entityId = 1;
  string entityType = 2;
  string labelId = 3;
}

message AttachLabelResponse {
  bool success = 1;
}

message DetachLabelRequest {
  string entityId = 1;
  string entityType = 2;
  string labelId = 3;
}

message DetachLabelResponse {
  bool success = 1;
}

message ListEntityLabelsRequest {
  string entityId = 1;
  string entityType = 2;
}

message ListEntityLabelsResponse {
  repeated Label labels = 1;
}

service LabelService {
  rpc CreateLabel(CreateLabelRequest) returns (CreateLabelResponse);
  rpc ListLabels(ListLabelsRequest) returns (ListLabelsResponse);
  rpc AttachLabel(AttachLabelRequest) returns (AttachLabelResponse);
  rpc DetachLabel(DetachLabelRequest) returns (DetachLabelResponse);
  rpc ListEntityLabels(ListEntityLabelsRequest) returns (ListEntityLabelsResponse);
}

message RepositoryLink {
  string id = 1;
  string project_id = 2;
  string provider = 3;
  string remote_name = 4;
  string created_at = 5;
  string auth_email = 6;
}

message RemotePullRequest {
  string id = 1;
  string repository_link_id = 2;
  string task_id = 3;
  string remote_pr_id = 4;
  string title = 5;
  string status = 6;
  string url = 7;
  string updated_at = 8;
}

message AddRepositoryLinkRequest {
  string project_id = 1;
  string provider = 2;
  string remote_name = 3;
  string oauth_code = 4; // OAuth2 flow: exchanged for a Bearer access token
  string api_token = 5; // Direct-token flow (Bitbucket only): used as-is with Basic auth
  string email = 6; // Required alongside api_token for Bitbucket's Basic auth scheme
}

message AddRepositoryLinkResponse {
  RepositoryLink link = 1;
}

message ListRepositoryLinksRequest {
  string project_id = 1;
}

message ListRepositoryLinksResponse {
  repeated RepositoryLink links = 1;
}

message SyncPullRequestsRequest {
  string project_id = 1;
}

message SyncPullRequestsResponse {
  bool success = 1;
}

message ListPullRequestsRequest {
  string project_id = 1;
}

message ListPullRequestsResponse {
  repeated RemotePullRequest pull_requests = 1;
}

message Build {
  string id = 1;
  string repository_link_id = 2;
  string status = 3;
  string commit_sha = 4;
  string created_at = 5;
}

message Deployment {
  string id = 1;
  string build_id = 2;
  string environment = 3;
  string status = 4;
  string created_at = 5;
}

message ListBuildsRequest {
  string repository_link_id = 1;
}

message ListBuildsResponse {
  repeated Build builds = 1;
}

message ListDeploymentsRequest {
  string build_id = 1;
  string repository_link_id = 2;
  string commit_sha = 3;
}

message ListDeploymentsResponse {
  repeated Deployment deployments = 1;
}

service RepositoryService {
  rpc AddRepositoryLink(AddRepositoryLinkRequest) returns (AddRepositoryLinkResponse);
  rpc ListRepositoryLinks(ListRepositoryLinksRequest) returns (ListRepositoryLinksResponse);
  rpc SyncPullRequests(SyncPullRequestsRequest) returns (SyncPullRequestsResponse);
  rpc ListPullRequests(ListPullRequestsRequest) returns (ListPullRequestsResponse);
  rpc ListBuilds(ListBuildsRequest) returns (ListBuildsResponse);
  rpc ListDeployments(ListDeploymentsRequest) returns (ListDeploymentsResponse);
}

message SearchResult {
  string id = 1;
  string type = 2; // "task" | "artifact"
  string title = 3;
  string snippet = 4;
}

message UniversalSearchRequest {
  string query = 1;
  PageRequest page = 2;
  string orgId = 3;
}

message UniversalSearchResponse {
  repeated SearchResult results = 1;
  PageResponse page = 2;
}

service SearchService {
  rpc UniversalSearch(UniversalSearchRequest) returns (UniversalSearchResponse);
}
