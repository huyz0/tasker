version: v2
plugins:
  - local: protoc-gen-es
    out: gen/ts
    opt: target=ts

  - local: protoc-gen-go
    out: ../../apps/cli/gen
    opt:
      - paths=source_relative
      - Mtasker/health/v1.proto=github.com/huyz0/tasker/apps/cli/gen/tasker/health/v1
  - local: protoc-gen-connect-go
    out: ../../apps/cli/gen
    opt:
      - paths=source_relative
      - Mtasker/health/v1.proto=github.com/huyz0/tasker/apps/cli/gen/tasker/health/v1
