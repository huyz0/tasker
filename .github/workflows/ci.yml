name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  gui:
    name: GUI (React/Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for moon affected
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup Moon
        uses: moonrepo/setup-moon-action@v1
      - name: Install dependencies
        run: |
          # Install shared contract first so it can compile
          cd packages/shared-contract && (npm ci || npm install) && cd ../..
          cd apps/gui && (npm ci || npm install)
      - name: Build & Test (Cached)
        run: moon run gui:lint gui:typecheck gui:test gui:build

  backend:
    name: Backend (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Setup Moon
        uses: moonrepo/setup-moon-action@v1
      - name: Install dependencies
        run: |
          cd packages/shared-contract && (npm ci || npm install) && cd ../..
          cd apps/backend && bun install
      - name: Build & Test (Cached)
        run: moon run backend:lint backend:test

  cli:
    name: CLI (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Setup Moon
        uses: moonrepo/setup-moon-action@v1
      - name: Setup Shared Contract
        run: cd packages/shared-contract && (npm ci || npm install)
      - name: Build & Test (Cached)
        run: moon run cli:format cli:vet cli:test cli:build

  contract:
    name: Shared Contract (TypeSpec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup Moon
        uses: moonrepo/setup-moon-action@v1
      - name: Install dependencies
        run: cd packages/shared-contract && (npm ci || npm install)
      - name: Compile and Format (Cached)
        run: moon run shared-contract:format shared-contract:compile
