name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  contract:
    name: Shared Contract (TypeSpec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Setup Moon
        uses: moonrepo/setup-toolchain@v0
      - name: Install dependencies
        run: cd packages/shared-contract && (npm ci || npm install)
      - name: Compile and Format (Cached)
        run: moon run shared-contract:format shared-contract:compile

  gui:
    name: GUI (React/Vite)
    runs-on: ubuntu-latest
    needs: contract
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # needed for moon affected
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Setup Moon
        uses: moonrepo/setup-toolchain@v0
      - name: Install dependencies
        run: |
          # Install shared contract first so it can compile
          cd packages/shared-contract && (npm ci || npm install) && cd ../..
          cd apps/gui && (npm ci --legacy-peer-deps || npm install --legacy-peer-deps)
      - name: Build & Test (Cached)
        run: moon run gui:lint gui:typecheck gui:build

  backend:
    name: Backend (Bun)
    runs-on: ubuntu-latest
    needs: contract
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.0.30'
      - name: Setup Moon
        uses: moonrepo/setup-toolchain@v0
      - name: Install dependencies
        run: |
          cd packages/shared-contract && (npm ci || npm install) && cd ../..
          cd apps/backend && bun install
      - name: Build & Test (Cached)
        run: moon run backend:test

  cli:
    name: CLI (Go)
    runs-on: ubuntu-latest
    needs: contract
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: apps/cli/go.sum
      - name: Setup Moon
        uses: moonrepo/setup-toolchain@v0
      - name: Setup Shared Contract
        run: cd packages/shared-contract && (npm ci || npm install)
      - name: Build & Test (Cached)
        run: moon run cli:format cli:vet cli:test cli:build
