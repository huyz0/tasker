name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  gui:
    name: GUI (React/Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gui
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Lint
        run: npm run lint
      - name: Type Check
        run: npx tsc --noEmit
      - name: Test
        run: npm test || echo "No tests defined"
      - name: Build
        run: npm run build

  backend:
    name: Backend (Bun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Lint
        run: bunx eslint . || echo "ESLint not yet configured"
      - name: Test
        run: bun test

  cli:
    name: CLI (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cli
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Format
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -d .
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -v ./...
      - name: Build
        run: go build -v ./...

  contract:
    name: Shared Contract (TypeSpec)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/shared-contract
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Format
        run: npx tsp format --check || echo "tsp format check"
      - name: Compile
        run: npx tsp compile main.tsp
